name: Monthly reports

on:
  schedule:
    - cron: '5 0 1 * *'
  workflow_dispatch:

jobs:
  generate-reports:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install report deps
        working-directory: functions
        run: npm install --no-audit --no-fund

      - name: Run monthly reports
        working-directory: functions
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          REPORTS_GMAIL_USER: ${{ secrets.REPORTS_GMAIL_USER }}
          REPORTS_GMAIL_APP_PASSWORD: ${{ secrets.REPORTS_GMAIL_APP_PASSWORD }}
          REPORTS_FROM_EMAIL: ${{ secrets.REPORTS_FROM_EMAIL }}
          REPORTS_TIME_ZONE: Asia/Kolkata
        run: node run-monthly-reports.js
